name: Copilot Brain
version: "0.4.18"
slug: copilot_brain
description: >-
  Experimental GitHub-powered AI control plane for Home Assistant with chat, HA terminal, and MCP endpoint.
  All configuration is done from the built-in UI — no add-on options required.
url: https://github.com/ussdeveloper/ha-github-copilot
documentation: https://github.com/ussdeveloper/ha-github-copilot/blob/main/copilot_brain/DOCS.md
arch:
  - amd64
  - aarch64
startup: application
boot: auto
stage: experimental
init: false
ingress: true
ingress_port: 8099
panel_title: Copilot Brain
panel_icon: mdi:robot-excited
homeassistant_api: true
hassio_api: true
hassio_role: manager
auth_api: true
host_network: true
map:
  - type: addon_config
    read_only: false
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Copilot Brain HTTP API and MCP endpoint
watchdog: http://[HOST]:[PORT:8099]/api/health
